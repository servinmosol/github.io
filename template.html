<!DOCTYPE html>
<html lang="{{LANG}}" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="meta_title">Lanza Estudio</title>
    <meta name="description" data-i18n="meta_description" content="">
    <link href="{{BASE_PATH}}/output.css" rel="stylesheet">
    
    <!-- Etiquetas hreflang para SEO -->
    {{HREFLANG_TAGS}}
</head>
<body class="bg-gray-50 text-gray-900 transition-colors duration-300 dark:bg-gray-950 dark:text-gray-100 font-sans antialiased">

    <header class="w-full px-6 py-4 flex justify-between items-center border-b border-gray-200 dark:border-gray-800">
        <!-- LOGO RESPONSIVE -->
        <a href="./" class="flex items-center gap-3 font-bold text-xl tracking-tight focus:outline-none">
            <img src="{{BASE_PATH}}/img/web/ico.png" alt="Lanza Estudio" class="h-8 w-auto object-contain">
            <!-- Texto para PC -->
            <span class="hidden lg:inline">Lanza Estudio</span>
            <!-- Texto para Tablet -->
            <span class="hidden md:inline lg:hidden">LE</span>
        </a>
        
        <div class="flex items-center gap-4">
            <!-- Selector de idioma -->
            <select id="lang-selector" onchange="location = this.value;" class="bg-transparent text-gray-900 dark:text-gray-100 border border-gray-300 dark:border-gray-700 rounded px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                <option value="{{LANG_OPT_ES}}" {{SELECTED_ES}} class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100">ES</option>
                <option value="{{LANG_OPT_EN}}" {{SELECTED_EN}} class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100">EN</option>
                <option value="{{LANG_OPT_FR}}" {{SELECTED_FR}} class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100">FR</option>
                <option value="{{LANG_OPT_DE}}" {{SELECTED_DE}} class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100">DE</option>
                <option value="{{LANG_OPT_PT}}" {{SELECTED_PT}} class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100">PT</option>
                <option value="{{LANG_OPT_NL}}" {{SELECTED_NL}} class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100">NL</option>
                <option value="{{LANG_OPT_IT}}" {{SELECTED_IT}} class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100">IT</option>
            </select>

            <button id="theme-toggle" class="p-2 rounded bg-gray-200 dark:bg-gray-800 hover:bg-gray-300 dark:hover:bg-gray-700 transition" aria-label="Cambiar tema">
                <span id="theme-icon">🌙</span>
            </button>
        </div>
    </header>

    <main class="w-full max-w-7xl mx-auto px-6 py-12 md:py-24 flex flex-col items-start gap-8">
        <span data-i18n="hero_badge" class="px-3 py-1 text-sm font-semibold rounded-full bg-emerald-100 text-emerald-800 dark:bg-emerald-900/30 dark:text-emerald-400">
            Sistemas a medida
        </span>

        <h1 data-i18n="hero_title" class="text-4xl md:text-6xl lg:text-7xl font-extrabold tracking-tight leading-tight max-w-4xl">
            Automatización real para empresas que valoran su tiempo.
        </h1>

        <p data-i18n="hero_subtitle" class="text-lg md:text-2xl text-gray-600 dark:text-gray-400 max-w-2xl">
            Desarrollamos e integramos IA directamente en tu infraestructura. Sin cuotas mensuales por software, sin intermediarios.
        </p>
    </main>

    <script src="{{BASE_PATH}}/app.js" defer></script>
</body>
</html>
