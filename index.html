<!DOCTYPE html>
<!-- El idioma por defecto es español -->
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lanza Estudio</title>
    <link href="./output.css" rel="stylesheet">
</head>
<!-- Tailwind: Fondo claro por defecto, fondo oscuro con la clase dark: -->
<body class="bg-gray-50 text-gray-900 transition-colors duration-300 dark:bg-gray-950 dark:text-gray-100 font-sans antialiased">

    <!-- NAVEGACIÓN MOBILE-FIRST -->
    <header class="w-full px-6 py-4 flex justify-between items-center border-b border-gray-200 dark:border-gray-800">
        <!-- Logo -->
        <div class="font-bold text-xl tracking-tight">LANZA</div>
        
        <!-- Controles: Idioma y Tema -->
        <div class="flex items-center gap-4">
            <select id="lang-selector" class="bg-transparent border border-gray-300 dark:border-gray-700 rounded px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                <option value="es">ES</option>
                <option value="en">EN</option>
                <option value="fr">FR</option>
                <option value="de">DE</option>
                <option value="pt">PT</option>
            </select>

            <button id="theme-toggle" class="p-2 rounded bg-gray-200 dark:bg-gray-800 hover:bg-gray-300 dark:hover:bg-gray-700 transition" aria-label="Cambiar tema">
                <!-- Icono de Luna/Sol gestionado por JS -->
                <span id="theme-icon">🌙</span>
            </button>
        </div>
    </header>

    <!-- HERO SECTION (Estructura base) -->
    <main class="w-full max-w-7xl mx-auto px-6 py-12 md:py-24 flex flex-col items-start gap-8">
        
        <!-- Etiqueta superior -->
        <span data-i18n="hero_badge" class="px-3 py-1 text-sm font-semibold rounded-full bg-emerald-100 text-emerald-800 dark:bg-emerald-900/30 dark:text-emerald-400">
            Sistemas a medida
        </span>

        <!-- Titular Mobile-First -->
        <h1 data-i18n="hero_title" class="text-4xl md:text-6xl lg:text-7xl font-extrabold tracking-tight leading-tight max-w-4xl">
            Automatización real para empresas que valoran su tiempo.
        </h1>

        <!-- Párrafo -->
        <p data-i18n="hero_subtitle" class="text-lg md:text-2xl text-gray-600 dark:text-gray-400 max-w-2xl">
            Desarrollamos e integramos IA directamente en tu infraestructura. Sin cuotas mensuales por software, sin intermediarios.
        </p>

    </main>

    <!-- Sustituye el <script src="./app.js"></script> por esto -->
    <script>
        // ==========================================
        // 1. DICCIONARIO DE IDIOMAS (i18n)
        // ==========================================
        const translations = {
            es: {
                hero_badge: "Sistemas a medida",
                hero_title: "Automatización real para empresas que valoran su tiempo.",
                hero_subtitle: "Desarrollamos e integramos IA directamente en tu infraestructura. Sin cuotas mensuales por software, sin intermediarios."
            },
            en: {
                hero_badge: "Custom Systems",
                hero_title: "Real automation for companies that value their time.",
                hero_subtitle: "We develop and integrate AI directly into your infrastructure. No monthly software fees, no middlemen."
            },
            fr: {
                hero_badge: "Systèmes sur mesure",
                hero_title: "Une véritable automatisation pour les entreprises qui valorisent leur temps.",
                hero_subtitle: "Nous développons et intégrons l'IA directement dans votre infrastructure. Pas de frais mensuels, pas d'intermédiaires."
            },
            de: {
                hero_badge: "Maßgeschneiderte Systeme",
                hero_title: "Echte Automatisierung für Unternehmen, die ihre Zeit schätzen.",
                hero_subtitle: "Wir entwickeln und integrieren KI direkt in Ihre Infrastruktur. Keine monatlichen Softwaregebühren, keine Vermittler."
            },
            pt: {
                hero_badge: "Sistemas sob medida",
                hero_title: "Automação real para empresas que valorizam seu tempo.",
                hero_subtitle: "Desenvolvemos e integramos IA diretamente na sua infraestrutura. Sem taxas mensais de software, sem intermediários."
            }
        };

        const langSelector = document.getElementById('lang-selector');

        function setLanguage(lang) {
            document.documentElement.lang = lang;
            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.getAttribute('data-i18n');
                if (translations[lang] && translations[lang][key]) {
                    element.textContent = translations[lang][key];
                }
            });
        }

        if (langSelector) {
            langSelector.addEventListener('change', (e) => setLanguage(e.target.value));
        }

        // ==========================================
        // 2. GESTOR DE MODO OSCURO / CLARO BLINDADO
        // ==========================================
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const htmlElement = document.documentElement;

        // Funciones con try/catch para evitar bloqueos del navegador en local
        function getSavedTheme() {
            try { return localStorage.getItem('theme'); } catch(e) { return null; }
        }
        function saveTheme(theme) {
            try { localStorage.setItem('theme', theme); } catch(e) { console.warn("Modo local: no se puede guardar el tema"); }
        }

        function initTheme() {
            const saved = getSavedTheme();
            if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                htmlElement.classList.add('dark');
                if(themeIcon) themeIcon.textContent = '☀️';
            } else {
                htmlElement.classList.remove('dark');
                if(themeIcon) themeIcon.textContent = '🌙';
            }
        }

        if (themeToggleBtn) {
            themeToggleBtn.addEventListener('click', () => {
                htmlElement.classList.toggle('dark');
                
                if (htmlElement.classList.contains('dark')) {
                    saveTheme('dark');
                    if(themeIcon) themeIcon.textContent = '☀️';
                } else {
                    saveTheme('light');
                    if(themeIcon) themeIcon.textContent = '🌙';
                }
            });
        }

        initTheme();
    </script>
</body>
</html>
